<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hour Splitter for Invoice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Hour Splitter</h1>
        <div>
            <input type="number" id="money" placeholder="Enter Salary">
        </div>
        <div>
            <input type="number" id="hourlyRate" placeholder="Enter Hourly Rate">
        </div>
        <button id="calculate">Calculate</button>
        <div>
            <p class="resultHours"></p>
        </div>
        <div id="results">
            <p class="results">Your Results</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
